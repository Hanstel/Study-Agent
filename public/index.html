<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Study Agent</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Study Agent</p>
          <h1>自律学习助手</h1>
        </div>
        <div class="topbar-actions">
          <button class="secondary" id="loginBtn">登录</button>
          <div class="pill" id="statusPill">准备就绪</div>
        </div>
      </header>

      <div class="workspace-layout">
        <aside class="sidebar">
          <div class="sidebar-header">
            <div>
              <h2>对话历史</h2>
              <p>左侧切换会话，右侧继续当前对话。</p>
            </div>
            <button class="secondary" id="newConversationBtn">+ 新建</button>
          </div>
          <div class="conversation-list" id="conversationList"></div>
        </aside>

        <main class="workspace">
          <section class="card chat-card">
            <div class="card-header">
              <h2>对话区</h2>
              <p>与智能体进行流式对话，协议指令会自动触发页面动作。</p>
            </div>
            <div class="messages" id="messages"></div>
            <form class="composer" id="composer">
              <input id="messageInput" placeholder="请输入你的学习目标或任务提示…" autocomplete="off" />
              <button type="submit">发送</button>
            </form>
          </section>

          <section class="card focus-card">
            <div class="card-header">
              <h2>沉浸区</h2>
              <p>通过倒计时、全屏与环境音构建专注体验。</p>
            </div>
            <div class="focus-panel">
              <div class="timer" id="timerDisplay">25:00</div>
              <div class="focus-actions">
                <button class="secondary" id="startTimerBtn">开始 25 分钟</button>
                <button class="secondary" id="microStepBtn">开始 5 分钟微步骤</button>
              </div>
              <div class="focus-meta" id="focusMeta">当前任务：空闲中</div>
            </div>
          </section>

          <section class="card render-card">
            <div class="card-header">
              <h2>任务与成就</h2>
              <p>Agent 生成的待办与勋章会在这里被动态渲染。</p>
            </div>
            <div class="todo-list" id="todoList"></div>
          </section>
        </main>
      </div>
    </div>

    <div class="modal hidden" id="awardModal">
      <div class="modal-card">
        <h3 id="awardTitle">成就解锁</h3>
        <p id="awardMessage">你已经完成了第一个专注回合。</p>
        <button id="closeAwardBtn">关闭</button>
      </div>
    </div>

    <div class="modal hidden" id="loginModal">
      <div class="modal-card login-card">
        <h3>登录保存历史</h3>
        <p>请输入用户名，历史对话将保存在本地浏览器。</p>
        <form id="loginForm">
          <input id="usernameInput" placeholder="用户名" autocomplete="off" />
          <div class="login-actions">
            <button type="submit">登录</button>
          </div>
        </form>
      </div>
    </div>

    <script src="/app.js?v=20260722-2"></script>
  </body>
</html>
